<!DOCTYPE html>
<html lang="id">
<head>
 <meta charset="UTF-8">
 <title>Dark Mode</title>
 <style>
 body {
 font-family: Arial, sans-serif;
 background-color: #ffffff;
 color: #000000;
 transition: background-color 0.3s, color 0.3s;
 padding: 40px;
 }
 .dark {
 background-color: #1a1a1a;
 color: #ffffff;
 }
 #btnDark {
 padding: 10px 20px;
 cursor: pointer;
 border-radius: 8px;
 border: none;
 font-size: 16px;
 }
 </style>
</head>
<body>
 <h1>Belajar Dark Mode</h1>
 <p>Ini adalah contoh halaman web dengan fitur Dark Mode.</p>
 <button id="btnDark">🌙 Dark Mode</button>
 <script src="script.js"></script>
</body>
</html>
